const GC={'부평구':['1D9E75','E1F5EE'],'계양구':['378ADD','E6F1FB'],'서구':['D85A30','FAECE7'],'부천시':['7F77DD','EEEDFE'],'동구':['BA7517','FAEEDA'],'중구':['D4537E','FBEAF0'],'미추홀구':['639922','EAF3DE'],'남동구':['0F6E56','E1F5EE'],'김포시':['533AB7','EEEDFE']};
function gc(gu){return(GC[gu]||['888780','F1EFE8'])[0]}
function gl(gu){return(GC[gu]||['888780','F1EFE8'])[1]}

let map,markers=[],rline,smark,curDay=0,pOpen=true,curId=null;

window.addEventListener('load',function(){
  map=L.map('map',{center:[37.513,126.710],zoom:13,zoomControl:false});
  L.control.zoom({position:'bottomright'}).addTo(map);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM',maxZoom:19}).addTo(map);
  buildTabs();
  switchDay(0);
});

function buildTabs(){
  var tabs=document.getElementById('tabs');
  DAYS.forEach(function(d,i){
    var t=document.createElement('div');
    t.className='tab'+(i===0?' on':'');
    t.textContent=d.day+'일차';
    t.id='tb'+i;
    t.onclick=function(){switchDay(i);};
    tabs.appendChild(t);
  });
}

function switchDay(idx){
  curDay=idx; curId=null;
  document.querySelectorAll('.tab').forEach(function(t,i){t.classList.toggle('on',i===idx);});
  document.getElementById('tb'+idx).scrollIntoView({inline:'center',behavior:'smooth'});
  var d=DAYS[idx];
  document.getElementById('dtitle').textContent=d.day+'일차 · '+d.title;
  document.getElementById('dsub').textContent=d.desc;
  var gus=[...new Set(d.shops.map(function(s){return s.gu}))];
  document.getElementById('dstats').innerHTML=
    '<div class="dstat">방문 <b>'+d.shops.length+'개</b></div>'+
    '<div class="dstat">이동 <b>'+d.km+'km</b></div>'+
    '<div class="dstat"><b>'+gus.join('·')+'</b></div>';
  document.getElementById('pttl').textContent='방문 업체 목록 ('+d.shops.length+'개)';
  drawMap(d);
  drawList(d);
}

function drawMap(d){
  if(smark) map.removeLayer(smark);
  markers.forEach(function(m){map.removeLayer(m);});
  markers=[];
  if(rline) map.removeLayer(rline);

  var si=L.divIcon({html:'<div style="width:34px;height:34px;border-radius:50%;background:#0F1F2E;border:3px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:800;box-shadow:0 2px 10px rgba(0,0,0,.35)">S</div>',className:'',iconAnchor:[17,17]});
  smark=L.marker([d.slat,d.slng],{icon:si}).addTo(map).bindPopup('<b>출발점</b>');

  var pts=[[d.slat,d.slng]];
  d.shops.forEach(function(s){pts.push([s.la,s.ln]);});
  rline=L.polyline(pts,{color:'#028090',weight:2,opacity:0.5,dashArray:'5,8'}).addTo(map);

  d.shops.forEach(function(s){
    var sz=s.n<=9?26:22,fs=s.n<=9?11:9;
    var ic=L.divIcon({
      html:'<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:#'+gc(s.gu)+';border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;color:#fff;font-size:'+fs+'px;font-weight:700;box-shadow:0 2px 7px rgba(0,0,0,.25)">'+s.n+'</div>',
      className:'',iconAnchor:[sz/2,sz/2]
    });
    var nav='https://map.kakao.com/link/to/'+encodeURIComponent(s.nm)+','+s.la+','+s.ln;
    var popup='<div class="cp"><div class="cp-no">'+curDay+1+'일차 '+s.n+'번 · '+s.gu+'</div><div class="cp-nm">'+s.nm+'</div><div class="cp-ad">'+s.ad+'</div><div class="cp-ph">'+(s.ph||'번호 없음')+'</div><a class="cp-nav" href="'+nav+'" target="_blank">카카오맵 길찾기</a></div>';
    var mk=L.marker([s.la,s.ln],{icon:ic}).addTo(map).bindPopup(popup,{maxWidth:270});
    mk.on('click',function(){activateItem(s.n);scrollItem(s.n);});
    markers.push(mk);
  });

  map.fitBounds(L.latLngBounds(pts),{padding:[28,28]});
}

function drawList(d){
  document.getElementById('list').innerHTML=d.shops.map(function(s){
    return '<div class="si" id="li'+s.n+'" onclick="flyTo('+s.la+','+s.ln+','+s.n+')">'+
      '<div class="sno" style="background:#'+gl(s.gu)+';color:#'+gc(s.gu)+'">'+s.n+'</div>'+
      '<div class="si-info">'+
        '<div class="snm">'+s.nm+'</div>'+
        '<div class="sad">'+s.ad+'</div>'+
        '<div class="sph">'+(s.ph||'번호 없음')+'</div>'+
      '</div>'+
      '<div class="sgu" style="background:#'+gl(s.gu)+';color:#'+gc(s.gu)+'">'+s.gu+'</div>'+
    '</div>';
  }).join('');
}

function flyTo(la,ln,n){
  map.flyTo([la,ln],17,{duration:0.7});
  activateItem(n);
  markers.forEach(function(m){
    var ll=m.getLatLng();
    if(Math.abs(ll.lat-la)<0.0001&&Math.abs(ll.lng-ln)<0.0001) m.openPopup();
  });
}

function activateItem(n){
  curId=n;
  document.querySelectorAll('.si').forEach(function(el){el.classList.toggle('on',el.id==='li'+n);});
}

function scrollItem(n){
  var el=document.getElementById('li'+n);
  if(el) el.scrollIntoView({block:'nearest',behavior:'smooth'});
}

function toggleP(){
  pOpen=!pOpen;
  document.getElementById('panel').classList.toggle('col',!pOpen);
  document.getElementById('ptoggle').textContent=pOpen?'접기 ▼':'펼치기 ▲';
}
</script>
</body>
</html>
